<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .search-box input {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            width: 300px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .search-box input:focus {
            outline: none;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .search-box button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background: white;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            transition: 0.3s transform, 0.3s box-shadow;
            backdrop-filter: blur(10px);
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .weather-card.main {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9), rgba(118, 75, 162, 0.9));
            color: white;
        }

        .weather-card.main h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .main-temp {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
        }

        .temp-value {
            font-size: 72px;
            font-weight: 700;
        }

        .weather-icon {
            font-size: 80px;
        }

        .weather-description {
            font-size: 20px;
            text-transform: capitalize;
            margin: 15px 0;
        }

        .card-label {
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .weather-card.main .card-label {
            color: rgba(255, 255, 255, 0.8);
        }

        .card-value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }

        .weather-card.main .card-value {
            color: white;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(102, 126, 234, 0.1);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .weather-card.main .detail-item {
            background: rgba(255, 255, 255, 0.15);
            border-left-color: white;
        }

        .hourly-container {
            display: grid;
            grid-template-columns: 1 / -1;
        }

        .hourly-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 15px 0;
        }

        .hourly-item {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            min-width: 100px;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .hourly-time {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .hourly-icon {
            font-size: 32px;
            margin: 8px 0;
        }

        .hourly-temp {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        .error {
            background: rgba(255, 77, 77, 0.95);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 40px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .favorites {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .favorite-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
        }

        .favorite-btn:hover {
            background: white;
            color: #667eea;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .forecast-day {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .forecast-icon {
            font-size: 32px;
            margin: 8px 0;
        }

        .forecast-temp {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .forecast-temp-range {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .search-box {
                flex-direction: column;
            }

            .search-box input {
                width: 100%;
            }

            .temp-value {
                font-size: 48px;
            }

            .weather-icon {
                font-size: 60px;
            }

            .details-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
        </div>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Search for a city..." onkeypress="handleKeyPress(event)">
            <button onclick="searchWeather()">Search</button>
        </div>

        <div class="favorites">
            <button class="favorite-btn" onclick="setCity('London')">London</button>
            <button class="favorite-btn" onclick="setCity('New York')">New York</button>
            <button class="favorite-btn" onclick="setCity('Tokyo')">Tokyo</button>
            <button class="favorite-btn" onclick="setCity('Singapore')">Singapore</button>
            <button class="favorite-btn" onclick="setCity('Paris')">Paris</button>
            <button class="favorite-btn" onclick="setCity('Sydney')">Sydney</button>
        </div>

        <div id="weatherContainer"></div>
    </div>

    <script>
        const API_KEY = '2d5c1ac28e2b4cdfbf142905242712'; // Open Weathermap Free API
        const API_URL = 'https://api.weatherapi.com/v1';

        async function getWeather(city) {
            const container = document.getElementById('weatherContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading weather data...</p></div>';

            try {
                // Current weather
                const currentResponse = await fetch(`${API_URL}/current.json?key=${API_KEY}&q=${city}&aqi=yes`);
                if (!currentResponse.ok) throw new Error('City not found');
                const currentData = await currentResponse.json();

                // Forecast (7 days)
                const forecastResponse = await fetch(`${API_URL}/forecast.json?key=${API_KEY}&q=${city}&days=7`);
                const forecastData = await forecastResponse.json();

                displayWeather(currentData, forecastData);
            } catch (error) {
                container.innerHTML = `<div class="error">❌ ${error.message}. Please try another city.</div>`;
            }
        }

        function displayWeather(currentData, forecastData) {
            const { current, location } = currentData;
            const { forecast } = forecastData;

            const weatherIcon = getWeatherEmoji(current.condition.code, current.is_day);
            const tempC = current.temp_c;
            const tempF = current.temp_f;
            const condition = current.condition.text;
            const humidity = current.humidity;
            const windKph = current.wind_kph;
            const feelsLike = current.feelslike_c;
            const pressure = current.pressure_mb;
            const visibility = current.vis_km;
            const uvIndex = current.uv;

            let html = `
                <div class="weather-grid">
                    <div class="weather-card main">
                        <h2>${location.name}, ${location.country}</h2>
                        <div class="main-temp">
                            <div>
                                <div class="temp-value">${Math.round(tempC)}°C</div>
                                <div style="font-size: 14px; opacity: 0.9;">${Math.round(tempF)}°F</div>
                            </div>
                            <div class="weather-icon">${weatherIcon}</div>
                        </div>
                        <div class="weather-description">${condition}</div>
                        <div class="details-grid">
                            <div class="detail-item">
                                <span class="card-label">Feels Like</span>
                                <div class="card-value">${Math.round(feelsLike)}°C</div>
                            </div>
                            <div class="detail-item">
                                <span class="card-label">Humidity</span>
                                <div class="card-value">${humidity}%</div>
                            </div>
                            <div class="detail-item">
                                <span class="card-label">Wind Speed</span>
                                <div class="card-value">${Math.round(windKph)} km/h</div>
                            </div>
                            <div class="detail-item">
                                <span class="card-label">Pressure</span>
                                <div class="card-value">${pressure} mb</div>
                            </div>
                            <div class="detail-item">
                                <span class="card-label">Visibility</span>
                                <div class="card-value">${visibility} km</div>
                            </div>
                            <div class="detail-item">
                                <span class="card-label">UV Index</span>
                                <div class="card-value">${uvIndex}</div>
                            </div>
                        </div>
                    </div>
            `;

            // Forecast section
            html += `
                    <div class="weather-card" style="grid-column: 1 / -1;">
                        <span class="card-label">7-Day Forecast</span>
                        <div class="forecast-grid">
            `;

            forecast.forecastday.forEach(day => {
                const date = new Date(day.date);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const icon = getWeatherEmoji(day.day.condition.code, true);
                const maxTemp = Math.round(day.day.maxtemp_c);
                const minTemp = Math.round(day.day.mintemp_c);

                html += `
                    <div class="forecast-card">
                        <div class="forecast-day">${dayName}</div>
                        <div class="forecast-icon">${icon}</div>
                        <div class="forecast-temp">${maxTemp}°C</div>
                        <div class="forecast-temp-range">${minTemp}°C</div>
                    </div>
                `;
            });

            html += `
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('weatherContainer').innerHTML = html;
        }

        function getWeatherEmoji(code, isDay) {
            // WeatherAPI condition codes
            if (code === 1000) return isDay ? '☀️' : '🌙';
            if (code === 1003) return isDay ? '⛅' : '🌤️';
            if (code === 1006) return '☁️';
            if (code === 1009) return '☁️';
            if (code === 1012) return '☁️';
            if (code === 1015 || code === 1016 || code === 1017 || code === 1018 || code === 1019) return '🌫️';
            if (code === 1021 || code === 1022 || code === 1024) return '🌫️';
            if (code === 1025 || code === 1026 || code === 1027 || code === 1030) return '🌫️';
            if (code === 1031 || code === 1032 || code === 1034 || code === 1035) return '🌫️';
            if (code === 1036 || code === 1037 || code === 1038 || code === 1039) return '🌫️';
            if (code === 1040 || code === 1041) return '💨';
            if (code === 1042 || code === 1043 || code === 1044 || code === 1045) return '❄️';
            if (code === 1046 || code === 1047 || code === 1048 || code === 1049) return '❄️';
            if (code === 1050 || code === 1051 || code === 1052) return '🌧️';
            if (code === 1053 || code === 1054 || code === 1055 || code === 1056) return '🌧️';
            if (code === 1057 || code === 1058 || code === 1063) return '🌧️';
            if (code === 1064 || code === 1065 || code === 1066) return '🌧️';
            if (code === 1067 || code === 1068 || code === 1069) return '🌨️';
            if (code === 1070 || code === 1071 || code === 1072) return '🌨️';
            if (code === 1073 || code === 1074 || code === 1075) return '🌨️';
            if (code === 1076 || code === 1077) return '🌨️';
            if (code === 1078 || code === 1079) return '⛈️';
            if (code === 1080 || code === 1081 || code === 1082) return '🌧️';
            if (code === 1083 || code === 1084 || code === 1085) return '🌧️';
            if (code === 1086 || code === 1087) return '⛈️';
            if (code === 1114 || code === 1115) return '❄️';
            if (code === 1117) return '❄️';
            if (code === 1135 || code === 1147) return '🌫️';
            if (code === 1150 || code === 1151 || code === 1152) return '🌧️';
            if (code === 1153 || code === 1154) return '🌧️';
            if (code === 1168 || code === 1169 || code === 1171) return '🌧️';
            if (code === 1180 || code === 1183) return '🌧️';
            if (code === 1186 || code === 1189) return '🌧️';
            if (code === 1192 || code === 1195) return '🌧️';
            if (code === 1198 || code === 1201) return '🌧️';
            if (code === 1204 || code === 1207) return '🌨️';
            if (code === 1210 || code === 1213 || code === 1216) return '🌨️';
            if (code === 1219 || code === 1222) return '🌨️';
            if (code === 1225 || code === 1237 || code === 1240) return '🌧️';
            if (code === 1243 || code === 1246) return '⛈️';
            if (code === 1249 || code === 1252) return '🌨️';
            if (code === 1255 || code === 1258) return '🌨️';
            if (code === 1261 || code === 1264) return '⛈️';
            if (code === 1273 || code === 1276) return '⛈️';
            if (code === 1279 || code === 1282) return '⛈️';
            return '🌤️';
        }

        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (city) {
                getWeather(city);
                document.getElementById('cityInput').value = '';
            }
        }

        function setCity(city) {
            getWeather(city);
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        }

        // Load default city on page load
        window.addEventListener('load', () => {
            getWeather('Singapore');
        });
    </script>
</body>
</html>
